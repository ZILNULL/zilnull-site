<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing</title>
  <link rel="stylesheet" href="/static/global.css" />
  <link rel="stylesheet" href="/static/writing.css" />
</head>
<body>
  <div class="ui" aria-hidden="true"></div>
  <div class="category-label" id="categoryLabel">{{ first_category }}</div>
  <div class="ui-buttons">
    <button class="ui-btn ui-btn--toggle" id="navToggle" data-tooltip="Toggle navigation" aria-label="Toggle navigation">👁</button>
    <nav class="ui-buttons-nav" id="uiNav">
      <a class="ui-btn" href="/index.html" data-tooltip="Home">★</a>
      <a class="ui-btn" href="/contactme.html" data-tooltip="Contact me">✉</a>
    </nav>
  </div>

  <div class="bookshelf">
    <div class="shelf-track" id="shelfTrack">
{{ shelf_sections }}
    </div>
  </div>

  <div class="floor">
    <div class="floor-plane">
      <div class="floor-grid"></div>
      <div class="floor-nav">
        <button class="floor-arrow" id="prevBtn" aria-label="Previous">←</button>
        <div class="floor-dots" id="floorDots"></div>
        <button class="floor-arrow" id="nextBtn" aria-label="Next">→</button>
      </div>
    </div>
  </div>

  <script src="/static/writing.js"></script>
</body>
</html>
